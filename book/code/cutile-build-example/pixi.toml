[workspace]
channels = ["conda-forge"]
platforms = [{ name = "linux-64-cuda", platform = "linux-64", cuda = "13" }]
preview = ["pixi-build"]

[tasks.start]
cmd = "cutile-vector-add"
description = "Run the packaged cuTile vector-add example"

[tasks.mandelbrot]
cmd = "cutile-mandelbrot"
description = "Render a GPU Mandelbrot set in the terminal (cuTile)"

[dependencies]
cutile-example = { path = "." }

[package.build]
backend = { name = "pixi-build-python", version = "0.*" }
config.ignore-pypi-mapping = false
